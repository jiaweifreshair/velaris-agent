<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" dominant-baseline="central"
    style="font-size: 16px; font-weight: 500; font-family: var(--font-sans);">Velaris Decision Intelligence Runtime</text>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central"
    style="font-size: 12px; font-family: var(--font-sans);">五层架构 + 学习闭环设计</text>

  <!-- Learning Loop (background, spans all layers) -->
  <rect x="40" y="70" width="600" height="480" rx="16" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="8,4" opacity="0.3"/>

  <!-- L0: Agent Runtime -->
  <g>
    <rect x="100" y="90" width="480" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text x="340" y="112" text-anchor="middle" dominant-baseline="central"
      style="font-size: 14px; font-weight: 500; font-family: var(--font-sans); color: #0C447C;">L0 · Agent Runtime</text>
    <text x="340" y="132" text-anchor="middle" dominant-baseline="central"
      style="font-size: 13px; font-family: var(--font-sans); color: #5F5E5A;">OpenHarness engine — LLM 推理 + 工具调用编排</text>
  </g>

  <!-- Arrow L0 → L1 -->
  <line x1="340" y1="146" x2="340" y2="166" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- L1: Goal-to-Plan -->
  <g>
    <rect x="100" y="166" width="480" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <text x="340" y="188" text-anchor="middle" dominant-baseline="central"
      style="font-size: 14px; font-weight: 500; font-family: var(--font-sans); color: #085041;">L1 · Goal-to-Plan</text>
    <text x="340" y="208" text-anchor="middle" dominant-baseline="central"
      style="font-size: 13px; font-family: var(--font-sans); color: #5F5E5A;">场景识别 (ScenarioRegistry) → 能力规划 → 治理约束</text>
  </g>

  <!-- Arrow L1 → L2 -->
  <line x1="340" y1="222" x2="340" y2="242" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- L2: Routing & Governance -->
  <g>
    <rect x="100" y="242" width="480" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="340" y="264" text-anchor="middle" dominant-baseline="central"
      style="font-size: 14px; font-weight: 500; font-family: var(--font-sans); color: #3C3489;">L2 · Routing & Governance</text>
    <text x="340" y="284" text-anchor="middle" dominant-baseline="central"
      style="font-size: 13px; font-family: var(--font-sans); color: #5F5E5A;">DynamicRouter 四层路由 → 能力签发 → 停止条件</text>
  </g>

  <!-- Arrow L2 → L3 -->
  <line x1="340" y1="298" x2="340" y2="318" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- L3: Decision Execution -->
  <g>
    <rect x="100" y="318" width="480" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="340" y="340" text-anchor="middle" dominant-baseline="central"
      style="font-size: 14px; font-weight: 500; font-family: var(--font-sans); color: #854F0B;">L3 · Decision Execution</text>
    <text x="340" y="360" text-anchor="middle" dominant-baseline="central"
      style="font-size: 13px; font-family: var(--font-sans); color: #5F5E5A;">多维评分 + 场景执行 + 数据自主抓取</text>
  </g>

  <!-- Arrow L3 → L4 -->
  <line x1="340" y1="374" x2="340" y2="394" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- L4: Runtime Control -->
  <g>
    <rect x="100" y="394" width="480" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text x="340" y="416" text-anchor="middle" dominant-baseline="central"
      style="font-size: 14px; font-weight: 500; font-family: var(--font-sans); color: #27500A;">L4 · Runtime Control</text>
    <text x="340" y="436" text-anchor="middle" dominant-baseline="central"
      style="font-size: 13px; font-family: var(--font-sans); color: #5F5E5A;">OpenViking + 任务账本 + Outcome 回写 + 决策快照</text>
  </g>

  <!-- Learning Loop Label (right side) -->
  <g transform="translate(620, 310)">
    <rect x="-60" y="-80" width="80" height="160" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
    <text x="0" y="-50" text-anchor="middle" dominant-baseline="central"
      style="font-size: 11px; font-weight: 500; font-family: var(--font-sans); color: #3C3489;">Learning</text>
    <text x="0" y="-32" text-anchor="middle" dominant-baseline="central"
      style="font-size: 11px; font-weight: 500; font-family: var(--font-sans); color: #3C3489;">Loop</text>
    <text x="0" y="-10" text-anchor="middle" dominant-baseline="central"
      style="font-size: 10px; font-family: var(--font-sans); color: #5F5E5A;">决策记忆</text>
    <text x="0" y="8" text-anchor="middle" dominant-baseline="central"
      style="font-size: 10px; font-family: var(--font-sans); color: #5F5E5A;">偏好学习</text>
    <text x="0" y="26" text-anchor="middle" dominant-baseline="central"
      style="font-size: 10px; font-family: var(--font-sans); color: #5F5E5A;">语义召回</text>
    <text x="0" y="44" text-anchor="middle" dominant-baseline="central"
      style="font-size: 10px; font-family: var(--font-sans); color: #5F5E5A;">自进化</text>
    <text x="0" y="62" text-anchor="middle" dominant-baseline="central"
      style="font-size: 10px; font-family: var(--font-sans); color: #5F5E5A;">Token Economics</text>
  </g>

  <!-- Arrows from Learning Loop to each layer -->
  <line x1="560" y1="118" x2="620" y2="230" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="560" y1="194" x2="620" y2="230" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="560" y1="270" x2="620" y2="230" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="560" y1="346" x2="620" y2="230" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="560" y1="422" x2="620" y2="230" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <text x="340" y="480" text-anchor="middle" dominant-baseline="central"
    style="font-size: 11px; font-family: var(--font-sans); fill: #888780;">Learning Loop 贯穿全层 — 每次决策都让下一次更好</text>

  <!-- User & External (bottom) -->
  <g>
    <rect x="240" y="520" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="340" y="542" text-anchor="middle" dominant-baseline="central"
      style="font-size: 14px; font-weight: 500; font-family: var(--font-sans); color: #444441;">用户目标 / 外部数据</text>
  </g>

  <!-- Arrow from User to L0 -->
  <line x1="340" y1="520" x2="340" y2="146" stroke="#888780" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrow)"/>
</svg>
