<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 1220" width="1640" height="1220">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97757"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f855a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#d9d0c3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      fill: #2a2118;
    }
    .subtitle {
      font-size: 16px;
      fill: #7b6a58;
    }
    .phase-label {
      font-size: 15px;
      font-weight: 700;
      fill: #9a6b47;
    }
    .participant {
      font-size: 15px;
      font-weight: 700;
      fill: #2a2118;
    }
    .message {
      font-size: 13px;
      fill: #5b5145;
    }
    .note-title {
      font-size: 13px;
      font-weight: 700;
      fill: #7b6a58;
    }
    .note-body {
      font-size: 12px;
      fill: #7b6a58;
    }
    .small {
      font-size: 12px;
      fill: #8b7f72;
    }
  </style>

  <rect width="1640" height="1220" fill="#fcfaf6"/>
  <rect x="28" y="24" width="1584" height="1170" rx="26" ry="26" fill="#fffdf9" stroke="#eadfce" stroke-width="1.5"/>

  <text x="820" y="74" text-anchor="middle" class="title">酒店用户 / 商旅用户场景的 Velaris-Agent 联合决策时序图</text>
  <text x="820" y="104" text-anchor="middle" class="subtitle">主链聚焦 proposal 与 confirmation：先拉候选、再做 bundle 排序、最后有序履约与反馈回写</text>

  <rect x="52" y="132" width="1536" height="530" rx="18" ry="18" fill="none" stroke="#d8cdbd" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="76" y="160" class="phase-label">提案阶段</text>

  <rect x="52" y="700" width="1536" height="450" rx="18" ry="18" fill="none" stroke="#d8cdbd" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="76" y="728" class="phase-label">确认与回写阶段</text>

  <g filter="url(#shadow)">
    <rect x="30" y="58" width="140" height="46" rx="12" ry="12" fill="#e9f1fb" stroke="#c7d7eb"/>
    <rect x="230" y="58" width="140" height="46" rx="12" ry="12" fill="#e9f1fb" stroke="#c7d7eb"/>
    <rect x="430" y="58" width="140" height="46" rx="12" ry="12" fill="#f7ecda" stroke="#dcc4a4"/>
    <rect x="630" y="58" width="140" height="46" rx="12" ry="12" fill="#efe8de" stroke="#d5c8b7"/>
    <rect x="830" y="58" width="140" height="46" rx="12" ry="12" fill="#e5e8df" stroke="#c4d0b0"/>
    <rect x="1030" y="58" width="140" height="46" rx="12" ry="12" fill="#c8e4db" stroke="#a7cabb"/>
    <rect x="1230" y="58" width="140" height="46" rx="12" ry="12" fill="#f7ecda" stroke="#dcc4a4"/>
    <rect x="1430" y="58" width="140" height="46" rx="12" ry="12" fill="#efe8de" stroke="#d5c8b7"/>
  </g>

  <text x="100" y="86" text-anchor="middle" class="participant">用户</text>
  <text x="300" y="86" text-anchor="middle" class="participant">Chat 入口</text>
  <text x="500" y="86" text-anchor="middle" class="participant">Platform Agent</text>
  <text x="700" y="86" text-anchor="middle" class="participant">租户策略 / 画像</text>
  <text x="900" y="86" text-anchor="middle" class="participant">Domain Agents</text>
  <text x="1100" y="86" text-anchor="middle" class="participant">Velaris-Agent</text>
  <text x="1300" y="86" text-anchor="middle" class="participant">Fulfillment Saga</text>
  <text x="1500" y="86" text-anchor="middle" class="participant">审计 / 记忆</text>

  <line x1="100" y1="104" x2="100" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="300" y1="104" x2="300" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="500" y1="104" x2="500" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="700" y1="104" x2="700" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="900" y1="104" x2="900" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="1100" y1="104" x2="1100" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="1300" y1="104" x2="1300" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>
  <line x1="1500" y1="104" x2="1500" y2="1140" stroke="#d6d3cd" stroke-width="1.5" stroke-dasharray="6 6"/>

  <rect x="292" y="205" width="16" height="78" rx="7" ry="7" fill="#cfe0f7" opacity="0.9"/>
  <rect x="492" y="215" width="16" height="265" rx="7" ry="7" fill="#e8cfad" opacity="0.95"/>
  <rect x="692" y="275" width="16" height="60" rx="7" ry="7" fill="#ddd5ca" opacity="0.95"/>
  <rect x="892" y="375" width="16" height="90" rx="7" ry="7" fill="#dce6d1" opacity="0.95"/>
  <rect x="1092" y="475" width="16" height="195" rx="7" ry="7" fill="#bfe0d5" opacity="0.95"/>
  <rect x="1492" y="525" width="16" height="72" rx="7" ry="7" fill="#ddd5ca" opacity="0.95"/>
  <rect x="492" y="815" width="16" height="115" rx="7" ry="7" fill="#e8cfad" opacity="0.95"/>
  <rect x="1292" y="870" width="16" height="220" rx="7" ry="7" fill="#e8cfad" opacity="0.95"/>
  <rect x="892" y="920" width="16" height="95" rx="7" ry="7" fill="#dce6d1" opacity="0.95"/>
  <rect x="1492" y="1015" width="16" height="72" rx="7" ry="7" fill="#ddd5ca" opacity="0.95"/>

  <rect x="1016" y="274" width="204" height="64" rx="12" ry="12" fill="#fff6eb" stroke="#e4c9a9"/>
  <text x="1034" y="296" class="note-title">Velaris-Agent 边界</text>
  <text x="1034" y="318" class="note-body">只输出 bundle 排序、决策依据、</text>
  <text x="1034" y="336" class="note-body">tradeoff 与 trace，不直接下单。</text>

  <line x1="100" y1="180" x2="300" y2="180" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="200" y="171" text-anchor="middle" class="message">提出复合需求</text>

  <line x1="300" y1="230" x2="500" y2="230" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="400" y="221" text-anchor="middle" class="message">组装 session / user / tenant</text>

  <line x1="500" y1="280" x2="700" y2="280" stroke="#d97757" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <text x="600" y="271" text-anchor="middle" class="message">读取画像 / 酒店策略 / 企业规则</text>

  <line x1="700" y1="330" x2="500" y2="330" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="600" y="321" text-anchor="middle" class="message">返回 context + hard constraints</text>

  <line x1="500" y1="380" x2="900" y2="380" stroke="#d97757" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <text x="700" y="371" text-anchor="middle" class="message">拉取 top-k 候选</text>

  <line x1="900" y1="430" x2="500" y2="430" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="700" y="421" text-anchor="middle" class="message">返回 candidate sets</text>

  <line x1="500" y1="480" x2="1100" y2="480" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="800" y="471" text-anchor="middle" class="message">提交 query + candidates + constraints</text>

  <line x1="1100" y1="530" x2="1500" y2="530" stroke="#d97757" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <text x="1300" y="521" text-anchor="middle" class="message">召回偏好 / 租户策略 / 历史 outcome</text>

  <line x1="1500" y1="580" x2="1100" y2="580" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="1300" y="571" text-anchor="middle" class="message">返回 weights + policy + trace refs</text>

  <line x1="1100" y1="630" x2="500" y2="630" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="800" y="621" text-anchor="middle" class="message">selected bundle + why / why-not / tradeoffs</text>

  <line x1="500" y1="680" x2="300" y2="680" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="400" y="671" text-anchor="middle" class="message">渲染 proposal + explanation</text>

  <line x1="100" y1="780" x2="300" y2="780" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="200" y="771" text-anchor="middle" class="message">确认 bundle</text>

  <line x1="300" y1="830" x2="500" y2="830" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="400" y="821" text-anchor="middle" class="message">发送 confirmation</text>

  <line x1="500" y1="880" x2="1300" y2="880" stroke="#d97757" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <text x="900" y="871" text-anchor="middle" class="message">启动 ordered fulfillment saga</text>

  <line x1="1300" y1="930" x2="900" y2="930" stroke="#d97757" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <text x="1100" y="921" text-anchor="middle" class="message">下单 / 锁库存 / 预约</text>

  <line x1="900" y1="980" x2="1300" y2="980" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="1100" y="971" text-anchor="middle" class="message">返回 refs / status</text>

  <line x1="1300" y1="1030" x2="1500" y2="1030" stroke="#2f855a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="1400" y="1021" text-anchor="middle" class="message">回写 outcome + feedback hook</text>

  <line x1="1300" y1="1080" x2="500" y2="1080" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="900" y="1071" text-anchor="middle" class="message">返回 completion summary + external refs</text>

  <line x1="500" y1="1120" x2="300" y2="1120" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="400" y="1111" text-anchor="middle" class="message">展示完成态 / 后续追踪入口</text>

  <g transform="translate(72,1158)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
    <text x="44" y="12" class="small">主请求 / 排序路径</text>
    <line x1="200" y1="8" x2="234" y2="8" stroke="#d97757" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
    <text x="244" y="12" class="small">治理 / 履约控制</text>
    <line x1="380" y1="8" x2="414" y2="8" stroke="#2f855a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
    <text x="424" y="12" class="small">反馈回写</text>
  </g>
</svg>
